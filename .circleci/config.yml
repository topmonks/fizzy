version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.1

jobs:
  test:
    docker:
      - image: cimg/ruby:3.4
    environment:
      RAILS_ENV: test
      SAAS: "false"
      BUNDLE_GEMFILE: Gemfile
      DATABASE_ADAPTER: sqlite
      BUNDLE_JOBS: "4"
      BUNDLE_RETRY: "3"
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends libvips42
            GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
      - restore_cache:
          keys:
            - gems-v1-{{ checksum "Gemfile.lock" }}
            - gems-v1-
      - run:
          name: Install gems
          command: |
            bundle config set --local path vendor/bundle
            bundle install
      - save_cache:
          key: gems-v1-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle
      - run:
          name: Prepare database
          command: bin/rails db:prepare
      - run:
          name: Style - Rubocop
          command: bin/rubocop
      - run:
          name: Security - Gem audit
          command: bin/bundler-audit check --update
      - run:
          name: Security - Importmap audit
          command: bin/importmap audit
      - run:
          name: Security - Brakeman
          command: bin/brakeman --quiet --no-pager --exit-on-warn --exit-on-error
      - run:
          name: Security - Gitleaks
          command: bin/gitleaks-audit
      - run:
          name: Tests
          command: bin/rails test

  build-and-push:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build and push Docker image
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            docker build \
              -t topmonkscom/fizzy:latest-${CIRCLE_BRANCH} \
              -t topmonkscom/fizzy:build-${CIRCLE_BUILD_NUM} \
              --build-arg OCI_SOURCE="https://github.com/basecamp/fizzy" \
              --build-arg OCI_DESCRIPTION="Fizzy build ${CIRCLE_BUILD_NUM}" \
              .

            docker push topmonkscom/fizzy:latest-${CIRCLE_BRANCH}
            docker push topmonkscom/fizzy:build-${CIRCLE_BUILD_NUM}

  deploy-ecs:
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup
      - run:
          name: Register task definition if changed
          command: |
            if git diff --quiet HEAD~1 HEAD -- ecs/fizzy.taskdef.json; then
              echo "Task definition unchanged, skipping registration..."
            else
              echo "Task definition changed, registering new revision..."
              aws ecs register-task-definition \
                --cli-input-json file://ecs/fizzy.taskdef.json \
                --region eu-central-1
            fi
      - run:
          name: Deploy to ECS
          command: |
            aws ecs update-service \
              --cluster fizzy-ticketing \
              --service fizzy-service \
              --task-definition fizzy-task \
              --force-new-deployment \
              --region eu-central-1

workflows:
  version: 2
  build-test-deploy:
    jobs:
      - test
      - build-and-push:
          requires:
            - test
          filters:
            branches:
              only:
                - main
          context:
            - org-docker
      - deploy-ecs:
          requires:
            - test
            - build-and-push
          filters:
            branches:
              only:
                - main
          context:
            - org-global
            - org-aws
