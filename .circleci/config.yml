version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.1

jobs:
  test:
    docker:
      - image: cimg/ruby:3.4
    environment:
      RAILS_ENV: test
      SAAS: "false"
      BUNDLE_GEMFILE: Gemfile
      DATABASE_ADAPTER: sqlite
      BUNDLE_JOBS: "4"
      BUNDLE_RETRY: "3"
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends libvips42
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
      - restore_cache:
          keys:
            - gems-v1-{{ checksum "Gemfile.lock" }}
            - gems-v1-
      - run:
          name: Install gems
          command: |
            bundle config set --local path vendor/bundle
            bundle install
      - save_cache:
          key: gems-v1-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle
      - run:
          name: Prepare database
          command: bin/rails db:prepare
      - run:
          name: Style - Rubocop
          command: bin/rubocop
      - run:
          name: Security - Gem audit
          command: bin/bundler-audit check --update
      - run:
          name: Security - Importmap audit
          command: bin/importmap audit
      - run:
          name: Security - Brakeman
          command: bin/brakeman --quiet --no-pager --exit-on-warn --exit-on-error
      - run:
          name: Security - Gitleaks
          command: bin/gitleaks-audit
      - run:
          name: Tests
          command: bin/rails test

  build-and-push:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build and push Docker image
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            docker build \
              -t topmonkscom/fizzy:latest-${CIRCLE_BRANCH} \
              -t topmonkscom/fizzy:build-${CIRCLE_BUILD_NUM} \
              --build-arg OCI_SOURCE="https://github.com/basecamp/fizzy" \
              --build-arg OCI_DESCRIPTION="Fizzy build ${CIRCLE_BUILD_NUM}" \
              .

            docker push topmonkscom/fizzy:latest-${CIRCLE_BRANCH}
            docker push topmonkscom/fizzy:build-${CIRCLE_BUILD_NUM}

  deploy-ecs:
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup
      - run:
          name: Register task definition and deploy
          command: |
            FAMILY=$(jq -r '.family' ecs/fizzy.taskdef.json)

            # Check if the latest task definition already matches our file
            CURRENT_ARN=$(aws ecs describe-task-definition \
              --task-definition "$FAMILY" \
              --region eu-central-1 \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text 2>/dev/null || echo "")

            if [ -n "$CURRENT_ARN" ]; then
              CURRENT_IMAGE=$(aws ecs describe-task-definition \
                --task-definition "$FAMILY" \
                --region eu-central-1 \
                --query 'taskDefinition.containerDefinitions[0].image' \
                --output text)
              FILE_IMAGE=$(jq -r '.containerDefinitions[0].image' ecs/fizzy.taskdef.json)

              if [ "$CURRENT_IMAGE" = "$FILE_IMAGE" ]; then
                echo "Task definition unchanged, reusing $CURRENT_ARN"
                TASK_DEF_ARN="$CURRENT_ARN"
              fi
            fi

            if [ -z "$TASK_DEF_ARN" ]; then
              TASK_DEF_ARN=$(aws ecs register-task-definition \
                --cli-input-json file://ecs/fizzy.taskdef.json \
                --region eu-central-1 \
                --query 'taskDefinition.taskDefinitionArn' \
                --output text)
              echo "Registered new task definition: $TASK_DEF_ARN"
            fi

            aws ecs update-service \
              --cluster fizzy-ticketing \
              --service fizzy-service \
              --task-definition "$TASK_DEF_ARN" \
              --desired-count 1 \
              --force-new-deployment \
              --region eu-central-1

workflows:
  version: 2
  build-test-deploy:
    jobs:
      - test
      - build-and-push:
          requires:
            - test
          filters:
            branches:
              only:
                - main
          context:
            - org-docker
      - deploy-ecs:
          requires:
            - test
            - build-and-push
          filters:
            branches:
              only:
                - main
          context:
            - org-global
            - org-aws
