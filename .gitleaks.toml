[extend]
useDefault = true

[allowlist]
paths = [
  '''log''',
  '''tmp''',
  '''.*\.yml\.enc''',
  '''docs/''',
  '''test/''',
]

[[rules]]
id = "sentry-dsn"
description = "Sentry DSN (public, not a secret)"
regex = '''https://[a-f0-9]+@.*\.sentry\.io/'''
[rules.allowlist]
regexTarget = "match"
regexes = ['''sentry\.io''']

[[rules]]
id = "basecamp-integration-url"
description = "Basecamp Integration URL"
regex = '''https://[^\s]*?([0-9a-fA-F]{16,})'''
[rules.allowlist]
regexTarget = "match"
regexes = ['''github\.com''']
